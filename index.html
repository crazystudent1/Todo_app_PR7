<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список справ (Firebase)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Мої справи</h1>
        
        <div class="counters">
            <p>Всього справ: <b id="item-count">0</b></p>
            <p>Незроблені: <b id="unchecked-count">0</b></p>
        </div>

        <div id="error-message" style="color: red; display: none; text-align: center; margin-bottom: 10px;"></div>
        <div id="loading-indicator" style="display: none; text-align: center; color: #0ea5e9; font-weight: bold; margin-bottom: 10px;">
            Завантаження даних...
        </div>

        <button id="new-todo-btn">Додати нову справу</button>

        <ul id="todo-list" class="todo-list">
            </ul>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
